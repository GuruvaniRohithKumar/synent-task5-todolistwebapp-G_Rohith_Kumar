<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Habit Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tracker-container">
        <h2>Weekly Habit Tracker</h2>
        
        <div class="storage-controls">
            <button id="export-btn">💾 Backup Data</button>
            <button id="clear-btn">🗑️ Reset Everything</button>
        </div>
        
        <div class="input-section">
            <input type="text" id="habit-input" placeholder="Enter a new habit (e.g., Exercise)..." autocomplete="off">
            <button id="add-habit-btn">Add Habit</button>
        </div>

        <div class="days-header">
            <span class="habit-name-label">Habit</span>
            <div class="days-labels">
                <span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
            </div>
            <span class="action-label"></span>
        </div>

        <div id="habit-list">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
